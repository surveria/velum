name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - closed
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:
    inputs:
      full:
        description: "Run the full report and benchmark gate"
        required: false
        default: "true"

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  rust:
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.action != 'closed' && github.event.pull_request.draft == false)
    concurrency:
      group: >-
        ${{
          github.event_name == 'pull_request' &&
          github.event.action != 'closed' &&
          format('rsqjs-ci-pr-{0}', github.event.pull_request.number) ||
          format('rsqjs-ci-run-{0}', github.run_id)
        }}
      cancel-in-progress: >-
        ${{
          github.event_name == 'pull_request' &&
          github.event.action != 'closed' &&
          github.event.pull_request.draft == false
        }}
    runs-on:
      - self-hosted
      - Linux
      - X64
      - surveria
      - rust
      - isolated
      - gha-runner-ctrl-test
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: /home/runner/.cache/cargo-target/rs-quickjs
      RSQJS_QUICKJS_SOURCE: git
      RSQJS_QUICKJS_CACHE_DIR: /home/runner/.cache/cargo-target/rs-quickjs/external/quickjs
      RSQJS_TEST262_CACHE_DIR: /home/runner/.cache/cargo-target/rs-quickjs/external/test262
      RSQJS_REPORT_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
      RSQJS_REPORT_TASK: ${{ github.event.pull_request.title || github.event.merge_group.head_ref || github.event_name }}
      RSQJS_CI_BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref || '' }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Full history so base-relative gates can find the merge base and
          # report artifacts can be keyed by the tested tree.
          fetch-depth: 0

      - name: Check self-hosted runner
        run: |
          printf 'RUNNER_NAME=%s\n' "${RUNNER_NAME:-unknown}"
          printf 'CARGO_HOME=%s\n' "${CARGO_HOME:-${HOME}/.cargo}"
          printf 'CARGO_TARGET_DIR=%s\n' "${CARGO_TARGET_DIR}"
          printf 'RSQJS_QUICKJS_CACHE_DIR=%s\n' "${RSQJS_QUICKJS_CACHE_DIR}"
          printf 'RSQJS_TEST262_CACHE_DIR=%s\n' "${RSQJS_TEST262_CACHE_DIR}"
          mkdir -p "${CARGO_TARGET_DIR}" "${RSQJS_QUICKJS_CACHE_DIR}" "${RSQJS_TEST262_CACHE_DIR}"
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version

      - name: Prepare report metadata
        id: report_metadata
        run: |
          tree_sha="$(git rev-parse 'HEAD^{tree}')"
          commit_sha="$(git rev-parse HEAD)"
          artifact_name="rsqjs-reports-${tree_sha}"
          printf 'tree_sha=%s\n' "${tree_sha}" >> "${GITHUB_OUTPUT}"
          printf 'artifact_name=%s\n' "${artifact_name}" >> "${GITHUB_OUTPUT}"
          {
            printf 'RSQJS_REPORT_TREE_SHA=%s\n' "${tree_sha}"
            printf 'RSQJS_REPORT_COMMIT_SHA=%s\n' "${commit_sha}"
            printf 'RSQJS_REPORT_EVENT_NAME=%s\n' "${GITHUB_EVENT_NAME}"
            printf 'RSQJS_REPORT_RUN_ID=%s\n' "${GITHUB_RUN_ID}"
            printf 'RSQJS_REPORT_RUN_ATTEMPT=%s\n' "${GITHUB_RUN_ATTEMPT}"
            printf 'RSQJS_REPORT_REPOSITORY=%s\n' "${GITHUB_REPOSITORY}"
            printf 'RSQJS_REPORT_WORKFLOW=%s\n' "${GITHUB_WORKFLOW}"
          } >> "${GITHUB_ENV}"

      - name: Check PR commit signatures
        if: github.event_name == 'pull_request'
        run: ./scripts/check-pr-commit-signatures.sh

      - name: CI checks
        env:
          RSQJS_DEPENDENCY_TOKEN: ${{ secrets.RSQJS_DEPENDENCY_TOKEN }}
        run: |
          if [[ -z "${RSQJS_DEPENDENCY_TOKEN}" ]]; then
            echo "RSQJS_DEPENDENCY_TOKEN is required for private Rust dependencies" >&2
            exit 1
          fi
          # Token rewrites for private git access: chertov hosts Rust
          # dependencies such as human-yaml, and surveria is needed for
          # authenticated base-branch fetches in this private repository.
          export GIT_CONFIG_COUNT=2
          export GIT_CONFIG_KEY_0="url.https://x-access-token:${RSQJS_DEPENDENCY_TOKEN}@github.com/chertov/.insteadOf"
          export GIT_CONFIG_VALUE_0="https://github.com/chertov/"
          export GIT_CONFIG_KEY_1="url.https://x-access-token:${RSQJS_DEPENDENCY_TOKEN}@github.com/surveria/.insteadOf"
          export GIT_CONFIG_VALUE_1="https://github.com/surveria/"
          # On pull_request and merge_group events, fetch the target base branch
          # and turn on base-relative policy gates.
          ci_base_ref="${RSQJS_CI_BASE_REF:-}"
          ci_base_ref="${ci_base_ref#refs/heads/}"
          if [[ -n "${ci_base_ref}" ]]; then
            git fetch --no-tags --quiet origin "${ci_base_ref}:refs/remotes/origin/${ci_base_ref}"
            export RSQJS_BASE_REF="origin/${ci_base_ref}"
          fi
          manual_full="${{ github.event.inputs.full }}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${manual_full:-true}" != "true" ]]; then
            RSQJS_FAST_RUNNER=1 ./scripts/check-fast.sh
          else
            ./scripts/test-all.sh
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.report_metadata.outputs.artifact_name }}
          path: target/rsqjs-reports
          if-no-files-found: ignore

  publish-report:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on:
      - self-hosted
      - Linux
      - X64
      - surveria
      - rust
      - isolated
      - gha-runner-ctrl-test
    permissions:
      contents: write
      actions: read
      pull-requests: read
    concurrency:
      group: rsqjs-report-publish-main
      queue: max
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: /home/runner/.cache/cargo-target/rs-quickjs
      GH_TOKEN: ${{ github.token }}
      RSQJS_MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      RSQJS_TESTED_SOURCE_ARCHIVE_REF: refs/rsqjs/ci-tested-sources
      RSQJS_TESTED_SOURCE_ARCHIVE_LEGACY_REF: refs/heads/ci-tested-sources
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure report publisher
        env:
          RSQJS_DEPENDENCY_TOKEN: ${{ secrets.RSQJS_DEPENDENCY_TOKEN }}
        run: |
          if [[ -z "${RSQJS_DEPENDENCY_TOKEN}" ]]; then
            echo "RSQJS_DEPENDENCY_TOKEN is required for private Rust dependencies" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          export GIT_CONFIG_COUNT=1
          export GIT_CONFIG_KEY_0="url.https://x-access-token:${RSQJS_DEPENDENCY_TOKEN}@github.com/chertov/.insteadOf"
          export GIT_CONFIG_VALUE_0="https://github.com/chertov/"
          mkdir -p "${CARGO_TARGET_DIR}"
          rustc --version
          cargo --version
          gh --version

      - name: Publish canonical report
        env:
          RSQJS_DEPENDENCY_TOKEN: ${{ secrets.RSQJS_DEPENDENCY_TOKEN }}
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ secrets.RSQJS_DEPENDENCY_TOKEN }}@github.com/chertov/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/chertov/
        run: ./scripts/publish-report-artifact.sh
