name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full:
        description: "Run the full report and benchmark gate"
        required: false
        default: "true"

jobs:
  rust:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - surveria
      - rust
      - isolated
      - gha-runner-ctrl-test
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: /home/runner/.cache/cargo-target/rs-quickjs
      RSQJS_QUICKJS_SOURCE: git
      RSQJS_QUICKJS_CACHE_DIR: /home/runner/.cache/cargo-target/rs-quickjs/external/quickjs
      RSQJS_TEST262_CACHE_DIR: /home/runner/.cache/cargo-target/rs-quickjs/external/test262
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Full history so the version-bump gate can find the merge base.
          fetch-depth: 0

      - name: Check self-hosted runner
        run: |
          printf 'RUNNER_NAME=%s\n' "${RUNNER_NAME:-unknown}"
          printf 'CARGO_HOME=%s\n' "${CARGO_HOME:-${HOME}/.cargo}"
          printf 'CARGO_TARGET_DIR=%s\n' "${CARGO_TARGET_DIR}"
          printf 'RSQJS_QUICKJS_CACHE_DIR=%s\n' "${RSQJS_QUICKJS_CACHE_DIR}"
          printf 'RSQJS_TEST262_CACHE_DIR=%s\n' "${RSQJS_TEST262_CACHE_DIR}"
          mkdir -p "${CARGO_TARGET_DIR}" "${RSQJS_QUICKJS_CACHE_DIR}" "${RSQJS_TEST262_CACHE_DIR}"
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version

      - name: CI checks
        env:
          RSQJS_DEPENDENCY_TOKEN: ${{ secrets.RSQJS_DEPENDENCY_TOKEN }}
        run: |
          if [[ -z "${RSQJS_DEPENDENCY_TOKEN}" ]]; then
            echo "RSQJS_DEPENDENCY_TOKEN is required for private Rust dependencies" >&2
            exit 1
          fi
          # Token rewrites for private git access: chertov (Rust deps such as
          # human-yaml) and surveria (the rs-quickjs-testing runner submodule).
          export GIT_CONFIG_COUNT=2
          export GIT_CONFIG_KEY_0="url.https://x-access-token:${RSQJS_DEPENDENCY_TOKEN}@github.com/chertov/.insteadOf"
          export GIT_CONFIG_VALUE_0="https://github.com/chertov/"
          export GIT_CONFIG_KEY_1="url.https://x-access-token:${RSQJS_DEPENDENCY_TOKEN}@github.com/surveria/.insteadOf"
          export GIT_CONFIG_VALUE_1="https://github.com/surveria/"
          # On a pull request GITHUB_BASE_REF names the base branch; fetch it and
          # turn on the engine version-bump gate against it.
          if [[ -n "${GITHUB_BASE_REF:-}" ]]; then
            git fetch --no-tags --quiet origin "${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
            export RSQJS_BASE_REF="origin/${GITHUB_BASE_REF}"
          fi
          manual_full="${{ github.event.inputs.full }}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" && "${RSQJS_FULL_CI_ON_PR:-0}" != "1" ]] || \
             [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${manual_full:-true}" != "true" ]]; then
            RSQJS_FAST_RUNNER=1 ./scripts/check-fast.sh
          else
            ./scripts/test-all.sh
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rsqjs-reports
          path: target/reports
          if-no-files-found: ignore
