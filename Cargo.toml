[workspace]
members = ["runner"]

[package]
name = "rs-quickjs"
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/surveria/rs-quickjs"
description = "A small JavaScript engine prototype written in safe Rust, using QuickJS as a reference."
readme = "README.md"

[lib]
name = "rs_quickjs"
path = "src/lib.rs"

[[bin]]
name = "rsqjs"
path = "src/bin/rsqjs.rs"

# The engine crate stays intentionally dependency-light. The test/benchmark
# runner and its heavier dependencies (tabled, plotters, image, rquickjs, ...)
# live in the separate `runner` crate.
[dependencies]
anyhow = "1"
parking_lot = "0.12"
serde_json = "1"
thiserror = "2"

[lints]
workspace = true

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
nursery = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
uninlined_format_args = "deny"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
mem_forget = "deny"
redundant_pub_crate = "deny"
too_many_lines = "deny"
cast_possible_truncation = "deny"
cast_sign_loss = "deny"
