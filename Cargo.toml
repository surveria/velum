[package]
name = "rs-quickjs"
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/surveria/rs-quickjs"
description = "A small JavaScript engine prototype written in safe Rust, using QuickJS as a reference."
readme = "README.md"

[lib]
name = "rs_quickjs"
path = "src/lib.rs"

[[bin]]
name = "rsqjs"
path = "src/bin/rsqjs.rs"

[[bin]]
name = "rsqjs-test-runner"
path = "src/bin/rsqjs-test-runner.rs"

[dependencies]
anyhow = "1"
human-yaml = { git = "https://github.com/chertov/human-yaml.git", rev = "1b83913343223316678776f0c5329d4c577df0f5" }
image = { version = "0.24", default-features = false, features = ["jpeg"] }
parking_lot = "0.12"
plotters = "0.3"
rquickjs = { version = "0.9", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tabled = "0.21.0"
thiserror = "2"

[features]
# Enables an in-process QuickJS reference (via the `rquickjs` binding) used by
# the benchmark runner. Off by default so library embedders never pull in the
# QuickJS C sources; the test/benchmark pipeline turns it on.
reference-quickjs = ["dep:rquickjs"]

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
nursery = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
uninlined_format_args = "deny"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
mem_forget = "deny"
redundant_pub_crate = "deny"
too_many_lines = "deny"
cast_possible_truncation = "deny"
cast_sign_loss = "deny"
