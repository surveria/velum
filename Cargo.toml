# Explicit single-crate workspace root: keeps the engine self-contained and
# excludes the `runner/` nested workspace, which carries heavier report and
# benchmark dependencies.
[workspace]
exclude = ["runner", "src/regress"]

[package]
name = "rs-quickjs"
version = "0.2.130"
edition = "2024"
license = "MIT"
repository = "https://github.com/surveria/rs-quickjs"
description = "A small JavaScript engine prototype written in safe Rust, using QuickJS as a reference."
readme = "README.md"

[lib]
name = "rs_quickjs"
path = "src/lib.rs"

[[bin]]
name = "rsqjs"
path = "src/bin/rsqjs.rs"

# The engine is a standalone, dependency-light crate. The test/benchmark runner
# lives in `runner/` as a separate nested workspace so its heavier dependencies
# do not become engine dependencies.
[dependencies]
anyhow = "1"
icu_locale = "2.2"
jiff-tzdb = "0.1.8"
num-bigint = "0.4"
num-traits = "0.2"
parking_lot = "0.12"
regress = { path = "src/regress", default-features = false, features = ["prohibit-unsafe", "std", "utf16"] }
temporal_rs = { version = "0.2.4", default-features = false, features = ["compiled_data", "float64_representable_durations", "std"] }
thiserror = "2"
unicode-ident = "1"
unicode-normalization = "0.1"
unicode-segmentation = "1.13"

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
nursery = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
uninlined_format_args = "deny"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
mem_forget = "deny"
redundant_pub_crate = "deny"
too_many_lines = "deny"
cast_possible_truncation = "deny"
cast_sign_loss = "deny"
